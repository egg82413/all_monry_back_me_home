<html lang="zh-Hant">

  <style>
    :root { --bg:#f4f6f8; --panel:#fff; --line:#d9dee7; --text:#172033; --muted:#697386; --blue:#1f6feb; --red:#dc2626; --green:#16a34a; --orange:#f97316; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); }
    main { width: calc(100% - 28px); margin: 28px auto 48px; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-end; margin-bottom: 16px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    a { color: var(--blue); text-decoration: none; font-weight: 800; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; box-shadow: 0 8px 22px rgba(15,23,42,.05); }
    .tools { display: grid; grid-template-columns: minmax(180px, 1fr) auto auto auto auto; gap: 8px; margin-bottom: 12px; align-items: center; }
    input, button { height: 36px; border: 1px solid #c8d0dc; border-radius: 7px; background: #fff; padding: 0 10px; color: var(--text); font-size: 14px; }
    button { cursor: pointer; font-weight: 750; }
    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    button.remove { color: #b91c1c; }
    button.clear-small { height: 30px; padding: 0 8px; font-size: 12px; color: #b91c1c; justify-self: start; }
    .json-box { margin: 12px 0; display: grid; gap: 8px; }
    textarea { width: 100%; min-height: 86px; border: 1px solid #c8d0dc; border-radius: 8px; padding: 10px; font: 13px Consolas, monospace; }
    .suggestions { display: grid; gap: 6px; margin-bottom: 12px; }
    .suggestion { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; padding: 9px 10px; border: 1px solid #e5eaf0; border-radius: 8px; background: #fbfcfe; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 1320px; }
    th, td { padding: 9px 10px; border-bottom: 1px solid #edf0f4; text-align: right; font-size: 13px; white-space: nowrap; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
    th { background: #f8fafc; color: #46556b; font-size: 12px; }
    tr:last-child td { border-bottom: 0; }
    .tag { display: inline-flex; align-items: center; justify-content: center; min-width: 64px; padding: 3px 8px; border-radius: 999px; font-weight: 800; font-size: 12px; }
    .tag-strong { background: #fee2e2; color: #b91c1c; }
    .tag-other { background: #eef2f7; color: #46556b; }
    .empty { padding: 24px; text-align: center; color: var(--muted); }
    .note { color: var(--muted); max-width: 240px; white-space: normal; text-align: left; }
    .buy-input { width: 92px; height: 30px; text-align: right; }
    @media (max-width: 760px) {
      main { width: calc(100% - 16px); margin-top: 12px; }
      header { display: grid; }
      .tools { grid-template-columns: 1fr; }
      .suggestion { grid-template-columns: 1fr; }
    }
  </style>
</head>

        const parsed = stored ? JSON.parse(stored) : INITIAL_WATCHLIST;
        const entries = Array.isArray(parsed) ? parsed : (Array.isArray(parsed?.symbols) ? parsed.symbols : []);

    function positionPlan(item, buyPrice) {
      const price = Number(item.price || item.close);
      const ma5 = Number(item.ma5);
      const ma10 = Number(item.ma10);
      const netScore = Number(item.netScore);
      const exitScore = Number(item.exitScore);
      const entryScore = Number(item.entryScore);
      const hasBuy = Number.isFinite(buyPrice) && buyPrice > 0;
      let defaultExit = Number.isFinite(ma10) ? ma10 : (hasBuy ? buyPrice * 0.92 : Number(item.exitPrice));
      if (hasBuy) {
        const lossStop = buyPrice * 0.92;
        defaultExit = Number.isFinite(defaultExit) ? Math.max(defaultExit, lossStop) : lossStop;
        if (Number.isFinite(price) && price >= buyPrice * 1.12 && Number.isFinite(ma5)) {
          defaultExit = Math.max(ma5, buyPrice * 1.03);
        }
      }
      let signal = "WATCH";
      let reason = "No clear action point yet";
      if (Number.isFinite(price) && Number.isFinite(defaultExit) && price <= defaultExit) {
        signal = "SELL_OR_REDUCE_TOMORROW";
        reason = "Price touched the default exit point";
      } else if (Number.isFinite(ma10) && Number.isFinite(price) && price < ma10 && exitScore >= entryScore) {
        signal = "SELL_OR_REDUCE_TOMORROW";
        reason = "Price is below MA10 and risk score is not low";
      } else if (netScore <= -20 || exitScore >= 50) {
        signal = "SELL_OR_REDUCE_TOMORROW";
        reason = "Risk signals are strong";
      } else if (netScore >= 60 && Number.isFinite(price) && Number.isFinite(ma5) && Number.isFinite(ma10) && price > ma5 && price > ma10 && exitScore <= 25) {
        signal = "ADD_ALLOWED";
        reason = "Strong buy and price is above MA5/MA10";
      } else if (Number.isFinite(ma5) && Number.isFinite(price) && price < ma5) {
        signal = "DO_NOT_ADD";
        reason = "Price is below MA5";
      }
      const pnlPct = hasBuy && Number.isFinite(price) ? (price - buyPrice) / buyPrice * 100 : NaN;
      return { defaultExit, signal, reason, pnlPct };
    }

    function renderSuggestions() {
      const query = search.value.trim().toLowerCase();
      if (!query) {
        suggestions.innerHTML = "";
        return;
      }
      const matches = RECORDS
        .filter(item => `${item.symbol} ${item.name || ""}`.toLowerCase().includes(query))
        .slice(0, 6);
      suggestions.innerHTML = matches.map(item => `
        <div class="suggestion">
          <strong>${item.symbol} ${item.name || ""}</strong>
          <span>淨分 ${fmt(item.netScore)}｜進場 ${fmt(item.entryPrice)} / 出場 ${fmt(item.exitPrice)}</span>
          <button data-add="${item.symbol}">加入</button>
        </div>
      `).join("");
    }

    function addSymbol(symbol) {
      const normalized = normalizeSymbol(symbol);
      if (!normalized || !bySymbol.has(normalized)) return;
      saveWatchlistEntries([...loadWatchlistEntries(), { symbol: normalized }]);
      search.value = "";
      renderSuggestions();
      renderRows();
    }

    function normalizeSymbol(value) {
      const text = String(value || "").trim().toUpperCase();
      if (bySymbol.has(text)) return text;
      const withSuffix = text.includes(".") ? text : `${text}.TW`;
      return bySymbol.has(withSuffix) ? withSuffix : "";
    }

    function removeSymbol(symbol) {
      saveWatchlistEntries(loadWatchlistEntries().filter(item => item.symbol !== symbol));
      renderRows();
    }

    function updateBuyPrice(symbol, value) {
      const buyPrice = Number(value);
      const entries = loadWatchlistEntries().map(entry =>
        entry.symbol === symbol ? { ...entry, buyPrice: Number.isFinite(buyPrice) && buyPrice > 0 ? buyPrice : null } : entry
      );
      saveWatchlistEntries(entries);
      renderRows();
    }

    function renderRows() {
      const entries = loadWatchlistEntries();
      if (!entries.length) {
        rows.innerHTML = `<tr><td colspan="15" class="empty">尚未加入關注股票</td></tr>`;
        return;
      }
      rows.innerHTML = entries.map(entry => {
        const item = bySymbol.get(entry.symbol);
        const link = item.href ? `${item.href}?symbol=${encodeURIComponent(item.symbol)}` : "#";
        const plan = positionPlan(item, entry.buyPrice);
        return `
          <tr>
            <td><a href="${link}">${item.symbol} ${item.name || ""}</a></td>
            <td>${actionTag(item.action)}</td>
            <td>${fmt(item.netScore)}</td>
            <td><input class="buy-input" data-buy="${item.symbol}" type="number" min="0" step="0.01" value="${entry.buyPrice ?? ""}" placeholder="買入價"></td>
            <td>${pctText(plan.pnlPct)}</td>
            <td>${fmt(item.price)}</td>
            <td>${fmt(item.close)}</td>
            <td>${fmt(item.ma5)}</td>
            <td>${fmt(item.ma10)}</td>
            <td>${fmt(item.entryPrice)}</td>
            <td>${fmt(item.reducePrice)}</td>
            <td>${fmt(plan.defaultExit)}</td>
            <td><strong>${plan.signal}</strong></td>
            <td class="note">${plan.reason}; ${item.planNote || ""}</td>
            <td><button class="remove" data-remove="${item.symbol}">移除</button></td>
          </tr>
        `;
      }).join("");
    }

    function exportJson() {
      const payload = JSON.stringify({ symbols: loadWatchlistEntries() }, null, 2);
      document.getElementById("json-output").value = payload;
      document.getElementById("json-box").hidden = false;
    }

    function importJsonFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const payload = JSON.parse(String(reader.result || ""));
          const rawSymbols = Array.isArray(payload) ? payload : payload.symbols;
          if (!Array.isArray(rawSymbols)) return;
          saveWatchlistEntries(rawSymbols.map(normalizeWatchlistEntry).filter(entry => entry.symbol));
          renderRows();
        } catch {}
      });
      reader.readAsText(file);
    }

    document.getElementById("add").addEventListener("click", () => addSymbol(search.value));
    document.getElementById("import-json").addEventListener("click", () => document.getElementById("import-file").click());
    document.getElementById("import-file").addEventListener("change", event => importJsonFile(event.target.files?.[0]));
    document.getElementById("export-json").addEventListener("click", exportJson);
    document.getElementById("clear").addEventListener("click", () => {
      if (!loadWatchlist().length) return;
      if (!confirm("確定要清空 watchlist 嗎？這會移除目前瀏覽器裡的所有關注股票。")) return;
      saveWatchlistEntries([]);
      renderRows();
    });
    search.addEventListener("input", renderSuggestions);
    search.addEventListener("keydown", event => { if (event.key === "Enter") addSymbol(search.value); });
    document.addEventListener("click", event => {
      const add = event.target.closest("[data-add]");
      const remove = event.target.closest("[data-remove]");
      if (add) addSymbol(add.dataset.add);
      if (remove) removeSymbol(remove.dataset.remove);
    });
    rows.addEventListener("change", event => {
      const input = event.target.closest("[data-buy]");
      if (input) updateBuyPrice(input.dataset.buy, input.value);
    });
    renderRows();
  </script>
